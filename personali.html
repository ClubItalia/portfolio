<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lavori Personali - Giovanni Massa</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="images/favicon.png">

            <a href="commissioni.html" class="category-box cat-last" style="--bg-image: url('images/commissioni.jpg');">

        <p>© 2026 - Ideato e sviluppato da Giovanni Massa</p>
